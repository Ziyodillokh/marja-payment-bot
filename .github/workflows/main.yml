# CI/CD pipeline:
# 1. main branch'ga har push da TypeScript build qilinadi (verifikatsiya).
# 2. Build muvaffaqiyatli bo'lsa, server'ga SSH orqali deploy:
#    deploy/deploy-server.sh ishga tushadi (idempotent, mavjud .env ni saqlaydi)
#
# Talab qilinadigan GitHub repo SECRETS (Settings → Secrets and variables → Actions):
#   SSH_HOST       — server IP (62.171.184.14)
#   SSH_USERNAME   — root
#   SSH_PASSWORD   — server paroli
#
# Ixtiyoriy:
#   PORT       — SSH port (default: 22)

name: CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────── 1) BUILD & VERIFY ───────────
  build:
    name: Build & verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: TypeScript build
        run: npm run build

  # ─────────── 2) DEPLOY (faqat build PASS bo'lsa) ───────────
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy via deploy-server.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e

            APP_PATH="/opt/marja-bot"

            # Birinchi deploy bo'lsa, shu yerga klon qilamiz.
            if [ ! -d "$APP_PATH/.git" ]; then
              echo "🆕 Birinchi deploy — repo klon qilinmoqda..."
              mkdir -p "$(dirname "$APP_PATH")"
              git clone https://github.com/${{ github.repository }}.git "$APP_PATH"
            fi

            cd "$APP_PATH"

            echo "🔄 git pull"
            git fetch --all
            git reset --hard origin/main

            # deploy-server.sh hammasini biladi:
            # - npm ci (bot va admin panel)
            # - prisma generate + db push + seed (idempotent)
            # - admin panel build
            # - PM2 restart (marja-bot, marja-admin)
            #
            # .env mavjud bo'lsa o'zgartirmaydi (passwords saqlanadi)
            #
            # Bot token va boshqa muhim qiymatlar — .env'da qo'lda kiritilgan
            # (deploy paytida birinchi marta yozilgan, keyin saqlanadi)
            bash deploy/deploy-server.sh
